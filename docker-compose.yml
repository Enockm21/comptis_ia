services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: comptis_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_secret
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
